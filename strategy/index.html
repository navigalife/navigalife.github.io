<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>MediVasc · Private</title>
  <link rel="icon" href="/assets/brand/favicon.svg" type="image/svg+xml">
  <style>
    :root { color-scheme: light; }
    :root[data-theme="dark"] { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100svh;
      display: flex; align-items: center; justify-content: center;
      background: #FAF7F2; color: #28211A;
      font: 400 18px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans", sans-serif;
      padding: 24px 16px;
    }
    .gate__card {
      width: 100%; max-width: 400px;
      background: #fff; border: 1px solid #E8E0D2; border-radius: 20px;
      box-shadow: 0 1px 2px rgba(40,33,26,.05), 0 10px 34px rgba(40,33,26,.08);
      padding: 34px 30px 30px;
      text-align: center;
    }
    .gate__lock {
      width: 56px; height: 56px; margin: 0 auto 16px;
      border-radius: 50%; background: #E4F2EC;
      display: flex; align-items: center; justify-content: center;
    }
    h1 {
      margin: 0 0 6px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 27px; font-weight: 600; letter-spacing: -0.01em;
    }
    .gate__sub { margin: 0 0 24px; color: #6E655A; font-size: 16.5px; }
    label { display: block; text-align: left; font-size: 15px; font-weight: 600; color: #6E655A; margin: 0 0 14px; }
    input[type="text"], input[type="password"] {
      display: block; width: 100%; margin-top: 5px;
      font: inherit; color: inherit;
      padding: 12px 14px;
      border: 1.5px solid #D9CFBF; border-radius: 12px;
      background: #FAF7F2;
    }
    input:focus { outline: 3px solid rgba(11,122,92,.35); border-color: #0B7A5C; }
    .gate__remember {
      display: flex; align-items: center; gap: 9px;
      font-weight: 400; color: #6E655A; font-size: 15.5px;
      margin: 18px 0 18px; cursor: pointer;
    }
    .gate__remember input { width: 19px; height: 19px; accent-color: #0B7A5C; }
    button {
      width: 100%;
      font: 600 18px/1 inherit; font-family: inherit;
      padding: 15px; border: 0; border-radius: 999px;
      background: #0B7A5C; color: #fff; cursor: pointer;
    }
    button:disabled { opacity: .65; cursor: wait; }
    .gate__err { min-height: 24px; margin: 14px 0 0; color: #A33A2A; font-size: 15.5px; font-weight: 600; }
    .gate--shake { animation: shake .4s; }
    @keyframes shake {
      20%, 60% { transform: translateX(-7px); }
      40%, 80% { transform: translateX(7px); }
    }

    /* Dark gate — mirrors the app palette so a remembered sign-in never
       flashes cream before the (dark) app paints. */
    :root[data-theme="dark"] body { background: #17130E; color: #EFE7DA; }
    :root[data-theme="dark"] .gate__card {
      background: #221C15; border-color: #332B21;
      box-shadow: 0 1px 2px rgba(0,0,0,.35), 0 10px 34px rgba(0,0,0,.5);
    }
    :root[data-theme="dark"] .gate__lock { background: #16332A; }
    :root[data-theme="dark"] .gate__lock svg { stroke: #6FD3AB; }
    :root[data-theme="dark"] .gate__sub,
    :root[data-theme="dark"] label,
    :root[data-theme="dark"] .gate__remember { color: #A99D8B; }
    :root[data-theme="dark"] input[type="text"],
    :root[data-theme="dark"] input[type="password"] {
      background: #17130E; border-color: #3A3226; color: #EFE7DA;
    }
    :root[data-theme="dark"] input:focus { outline-color: rgba(47,185,138,.4); border-color: #2FB98A; }
    :root[data-theme="dark"] .gate__remember input { accent-color: #2FB98A; }
    :root[data-theme="dark"] button { background: #159A72; }
    :root[data-theme="dark"] .gate__err { color: #E7896F; }
  </style>
  <script>
    // Set the saved theme before first paint so the gate matches the app.
    try {
      var __t = localStorage.getItem('mv-strategy-theme');
      if (!__t) __t = (window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', __t);
    } catch (e) {}
  </script>
</head>
<body>
  <form class="gate__card" id="gate" autocomplete="on">
    <div class="gate__lock" aria-hidden="true">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#075C45" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="10.5" width="16" height="10" rx="2.5"/><path d="M8 10.5V7.5a4 4 0 0 1 8 0v3"/></svg>
    </div>
    <h1>MediVasc · Growth Plan</h1>
    <p class="gate__sub">A private page for the owner.</p>
    <label>Username
      <input type="text" id="u" autocomplete="username" autocapitalize="none" autocorrect="off" required>
    </label>
    <label>Password
      <input type="password" id="p" autocomplete="current-password" required>
    </label>
    <label class="gate__remember"><input type="checkbox" id="remember" checked> Keep me signed in on this device</label>
    <button type="submit" id="go">Unlock</button>
    <p class="gate__err" id="err" role="alert"></p>
  </form>

/*
 * mvcrypt — self-contained SHA-256 / HMAC / PBKDF2 / authenticated stream
 * cipher used to encrypt the /strategy page for a PUBLIC repo.
 *
 * Why hand-rolled instead of WebCrypto: the LAN preview is served over plain
 * http (non-secure context), where crypto.subtle is undefined. This module is
 * dependency-free and runs identically in Node (encryptor + tests) and any
 * browser context. The browser shell still uses crypto.subtle for PBKDF2 when
 * available (it's the hot path) and falls back to this implementation.
 *
 * Scheme:
 *   key64 = PBKDF2-HMAC-SHA256(password, salt, iter, 64 bytes)
 *   kEnc = key64[0..31], kMac = key64[32..63]
 *   keystream block i = HMAC-SHA256(kEnc, iv || uint32BE(i))   (CTR over a PRF)
 *   ct  = pt XOR keystream
 *   tag = HMAC-SHA256(kMac, iv || ct)                          (encrypt-then-MAC)
 */
(function (root, factory) {
  if (typeof module !== 'undefined' && module.exports) module.exports = factory();
  else root.MVCrypt = factory();
})(typeof self !== 'undefined' ? self : this, function () {
  'use strict';

    0x428a2f98, 0x71374491, 0xb5c0fbcf, 0xe9b5dba5, 0x3956c25b, 0x59f111f1, 0x923f82a4, 0xab1c5ed5,
    0xd807aa98, 0x12835b01, 0x243185be, 0x550c7dc3, 0x72be5d74, 0x80deb1fe, 0x9bdc06a7, 0xc19bf174,
    0xe49b69c1, 0xefbe4786, 0x0fc19dc6, 0x240ca1cc, 0x2de92c6f, 0x4a7484aa, 0x5cb0a9dc, 0x76f988da,
    0x983e5152, 0xa831c66d, 0xb00327c8, 0xbf597fc7, 0xc6e00bf3, 0xd5a79147, 0x06ca6351, 0x14292967,
    0x27b70a85, 0x2e1b2138, 0x4d2c6dfc, 0x53380d13, 0x650a7354, 0x766a0abb, 0x81c2c92e, 0x92722c85,
    0xa2bfe8a1, 0xa81a664b, 0xc24b8b70, 0xc76c51a3, 0xd192e819, 0xd6990624, 0xf40e3585, 0x106aa070,
    0x19a4c116, 0x1e376c08, 0x2748774c, 0x34b0bcb5, 0x391c0cb3, 0x4ed8aa4a, 0x5b9cca4f, 0x682e6ff3,
    0x748f82ee, 0x78a5636f, 0x84c87814, 0x8cc70208, 0x90befffa, 0xa4506ceb, 0xbef9a3f7, 0xc67178f2
  ];

  var W = new Int32Array(64);

  function compress(state, block, offset) {
    var a = state[0], b = state[1], c = state[2], d = state[3];
    var e = state[4], f = state[5], g = state[6], h = state[7];
    var i, t1, t2, s0, s1, ch, maj, w;

    for (i = 0; i < 16; i++) {

      offset += 4;
    }
    for (i = 16; i < 64; i++) {
      w = W[i - 15];
      s0 = ((w >>> 7) | (w << 25)) ^ ((w >>> 18) | (w << 14)) ^ (w >>> 3);
      w = W[i - 2];
      s1 = ((w >>> 17) | (w << 15)) ^ ((w >>> 19) | (w << 13)) ^ (w >>> 10);
      W[i] = (W[i - 16] + s0 + W[i - 7] + s1) | 0;
    }
    for (i = 0; i < 64; i++) {
      s1 = ((e >>> 6) | (e << 26)) ^ ((e >>> 11) | (e << 21)) ^ ((e >>> 25) | (e << 7));
      ch = (e & f) ^ (~e & g);

      s0 = ((a >>> 2) | (a << 30)) ^ ((a >>> 13) | (a << 19)) ^ ((a >>> 22) | (a << 10));

    state[2] = (state[2] + c) | 0; state[3] = (state[3] + d) | 0;
    state[4] = (state[4] + e) | 0; state[5] = (state[5] + f) | 0;

  function initState() {
    return new Int32Array([0x6a09e667, 0xbb67ae85, 0x3c6ef372, 0xa54ff53a, 0x510e527f, 0x9b05688c, 0x1f83d9ab, 0x5be0cd19]);

  // state that already absorbed `prefixLen` bytes (used by the fast HMAC).

    var rem = bytes.length - full;

    pad.set(bytes.subarray(full));

    pad[tailLen - 4] = (bits >>> 24) & 0xff;
    pad[tailLen - 3] = (bits >>> 16) & 0xff;
    pad[tailLen - 2] = (bits >>> 8) & 0xff;
    pad[tailLen - 1] = bits & 0xff;
    // Payloads here are far below 512MB, so the high 32 bits of the length
    // stay zero (positions tailLen-8..tailLen-5).
    for (off = 0; off < tailLen; off += 64) compress(state, pad, off);
    return stateToBytes(state);
  }

  function sha256(bytes) {
    return sha256From(initState(), 0, bytes);
  }

  // HMAC with precomputed pad states so PBKDF2's inner loop only pays for the
  // message blocks, not re-absorbing the key every iteration.
  function hmacFactory(key) {
    if (key.length > 64) key = sha256(key);
    var ipad = new Uint8Array(64), opad = new Uint8Array(64);
    for (var i = 0; i < 64; i++) {
      ipad[i] = (key[i] || 0) ^ 0x36;
      opad[i] = (key[i] || 0) ^ 0x5c;
    }
    var innerBase = initState(); compress(innerBase, ipad, 0);
    var outerBase = initState(); compress(outerBase, opad, 0);
    return function (msg) {
      var inner = sha256From(new Int32Array(innerBase), 64, msg);
      return sha256From(new Int32Array(outerBase), 64, inner);
    };
  }

  function hmac(key, msg) { return hmacFactory(key)(msg); }

  function pbkdf2(password, salt, iterations, dkLen) {
    var prf = hmacFactory(password);
    var out = new Uint8Array(dkLen);
    var blocks = Math.ceil(dkLen / 32);
    for (var b = 1; b <= blocks; b++) {
      var msg = new Uint8Array(salt.length + 4);
      msg.set(salt);
      msg[salt.length] = (b >>> 24) & 0xff; msg[salt.length + 1] = (b >>> 16) & 0xff;
      msg[salt.length + 2] = (b >>> 8) & 0xff; msg[salt.length + 3] = b & 0xff;
      var u = prf(msg);
      var t = new Uint8Array(u);
      for (var i = 1; i < iterations; i++) {
        u = prf(u);
        for (var j = 0; j < 32; j++) t[j] ^= u[j];
      }
      out.set(t.subarray(0, Math.min(32, dkLen - (b - 1) * 32)), (b - 1) * 32);
    }
    return out;
  }

  function keystreamXor(kEnc, iv, data) {
    var prf = hmacFactory(kEnc);
    var out = new Uint8Array(data.length);
    var msg = new Uint8Array(iv.length + 4);
    msg.set(iv);
    var nBlocks = Math.ceil(data.length / 32);
    for (var i = 0; i < nBlocks; i++) {
      msg[iv.length] = (i >>> 24) & 0xff; msg[iv.length + 1] = (i >>> 16) & 0xff;
      msg[iv.length + 2] = (i >>> 8) & 0xff; msg[iv.length + 3] = i & 0xff;
      var block = prf(msg);
      var base = i * 32;
      var n = Math.min(32, data.length - base);
      for (var j = 0; j < n; j++) out[base + j] = data[base + j] ^ block[j];
    }
    return out;
  }

  function computeTag(kMac, iv, ct) {
    var msg = new Uint8Array(iv.length + ct.length);
    msg.set(iv); msg.set(ct, iv.length);
    return hmac(kMac, msg);
  }

  function tagsEqual(a, b) {
    if (a.length !== b.length) return false;
    var diff = 0;
    for (var i = 0; i < a.length; i++) diff |= a[i] ^ b[i];
    return diff === 0;
  }

  // key64 (Uint8Array, 64 bytes) -> { ct, tag } / plaintext or null on bad MAC
  function encryptWithKey(key64, iv, plaintext) {
    var ct = keystreamXor(key64.subarray(0, 32), iv, plaintext);
    return { ct: ct, tag: computeTag(key64.subarray(32, 64), iv, ct) };
  }

  function decryptWithKey(key64, iv, ct, tag) {
    var expected = computeTag(key64.subarray(32, 64), iv, ct);
    if (!tagsEqual(expected, tag)) return null;
    return keystreamXor(key64.subarray(0, 32), iv, ct);
  }

    sha256: sha256,
    hmac: hmac,
    pbkdf2: pbkdf2,
    encryptWithKey: encryptWithKey,
    decryptWithKey: decryptWithKey
  };
});

    var AUTH_KEY = 'mv-strategy-auth';
    var enc = new TextEncoder();
    var dec = new TextDecoder();

    function b64ToBytes(s) {
      var bin = atob(s), out = new Uint8Array(bin.length);
      for (var i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
      return out;
    }
    function bytesToB64(u8) {
      var bin = '';
      for (var i = 0; i < u8.length; i++) bin += String.fromCharCode(u8[i]);
      return btoa(bin);
    }

    var salt = b64ToBytes(PAYLOAD.salt);
    var iv = b64ToBytes(PAYLOAD.iv);
    var ct = b64ToBytes(PAYLOAD.ct);
    var tag = b64ToBytes(PAYLOAD.tag);

    // PBKDF2 via WebCrypto when the context allows it (https / localhost);
    // pure-JS fallback otherwise (e.g. LAN preview over plain http).
    function deriveKey(password) {
      if (window.crypto && crypto.subtle) {
        return crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveBits'])
          .then(function (k) {
            return crypto.subtle.deriveBits(
              { name: 'PBKDF2', hash: 'SHA-256', salt: salt, iterations: PAYLOAD.iter }, k, 512);
          })
          .then(function (bits) { return new Uint8Array(bits); })
          .catch(function () { return MVCrypt.pbkdf2(enc.encode(password), salt, PAYLOAD.iter, 64); });
      }
      return Promise.resolve(MVCrypt.pbkdf2(enc.encode(password), salt, PAYLOAD.iter, 64));
    }

    function tryKey(key64) {
      var pt = MVCrypt.decryptWithKey(key64, iv, ct, tag);
      if (!pt) return false;
      boot(JSON.parse(dec.decode(pt)));
      return true;
    }

    function boot(app) {
      window.__mvLock = function () {
        try { localStorage.removeItem(AUTH_KEY); } catch (e) {}
        location.reload();
      };
      // Drop the shell's own styles first — its generic button/body rules
      // (full-width pill, flex-centered body) must not leak into the app.
      Array.prototype.slice.call(document.querySelectorAll('style')).forEach(function (el) {
        el.parentNode.removeChild(el);
      });
      var style = document.createElement('style');
      style.textContent = app.css;
      document.head.appendChild(style);
      document.title = 'MediVasc · Growth Plan';
      document.body.innerHTML = app.html;
      new Function(app.js)();
    }

    // Auto-unlock with a remembered key (survives content updates because the
    // salt is fixed across rebuilds; a password change invalidates it cleanly).
    try {
      var saved = localStorage.getItem(AUTH_KEY);
      if (saved && tryKey(b64ToBytes(saved))) return;
      if (saved) localStorage.removeItem(AUTH_KEY);
    } catch (e) { /* fall through to the form */ }

    var gate = document.getElementById('gate');
    var err = document.getElementById('err');
    var go = document.getElementById('go');

    gate.addEventListener('submit', function (ev) {
      ev.preventDefault();
      err.textContent = '';
      var u = document.getElementById('u').value.trim().toLowerCase();
      var p = document.getElementById('p').value;
      if (u !== 'admin') { fail('That username isn’t right.'); return; }
      go.disabled = true;
      go.textContent = 'Unlocking…';
      // Let the button repaint before the key derivation starts.
      setTimeout(function () {
        deriveKey(p).then(function (key64) {
          var remember = document.getElementById('remember').checked;
          if (tryKey(key64)) {
            if (remember) { try { localStorage.setItem(AUTH_KEY, bytesToB64(key64)); } catch (e) {} }
            return;
          }
          fail('That password isn’t right. Check and try again.');
        });
      }, 30);
    });

    function fail(msg) {
      go.disabled = false;
      go.textContent = 'Unlock';
      err.textContent = msg;
      gate.classList.remove('gate--shake');
      void gate.offsetWidth;
      gate.classList.add('gate--shake');
    }
  })();
