name: Build and deploy MediVasc

on:
  push:
    branches:
      - main
      - preview
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # The live root is ALWAYS built from main, regardless of which branch
      # triggered this run, so a preview push can never alter medivasc.in/.
      - name: Check out production branch (main)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build site (production root)
        run: npm run build
      # Optional staging area: if a `preview` branch exists, build it and mount
      # it at /changes so reviewers can see it at medivasc.in/changes (and
      # /changes/admin). Fully non-fatal — any failure here leaves the live
      # site untouched and still deploys the production root.
      - name: Graft preview branch into /changes
        continue-on-error: true
        run: |
          set +e
          # SWITCH: if tools/CHANGES_DISABLED exists on main, /changes is OFF.
          # Instead of leaving the URL to fall through to the homepage-style 404,
          # publish an explicit "staging offline" page at /changes so it reads as
          # unmistakably off. Remove the marker (and redeploy main) to turn it on.
          if [ -f tools/CHANGES_DISABLED ]; then
            echo "tools/CHANGES_DISABLED present — /changes is switched OFF; serving offline notice."
            mkdir -p dist/changes
            cp tools/changes-offline.html dist/changes/index.html
            exit 0
          fi
          if ! git ls-remote --exit-code --heads origin preview >/dev/null 2>&1; then
            echo "No preview branch — skipping /changes."
            exit 0
          fi
          echo "preview branch found — building it into dist/changes"
          git fetch origin preview || exit 0
          git worktree add --force .preview origin/preview || exit 0
          ( cd .preview && npm ci && npm run build ) || { echo "preview build failed — skipping /changes"; git worktree remove --force .preview 2>/dev/null; exit 0; }
          mkdir -p dist/changes
          cp -R .preview/dist/. dist/changes/
          git worktree remove --force .preview 2>/dev/null
          echo "Grafted preview -> /changes"
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    # Only `main` deploys to the live Pages site (the github-pages environment
    # allows main only anyway). A `preview` push still runs `build` above as a
    # green build-check, but SKIPS deploy here — so it no longer emits a failed
    # deploy run (and its email). /changes is refreshed by main deploys, which
    # graft the current preview.
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
