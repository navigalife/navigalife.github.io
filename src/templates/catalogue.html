<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Naviga Life Product Catalogue</title>
  <style>
    @font-face{font-family:"Fraunces";font-style:normal;font-weight:600;font-display:swap;src:url("/assets/fonts/fraunces-latin-600.woff2") format("woff2")}
    @font-face{font-family:"Instrument Sans";font-style:normal;font-weight:400 600;font-display:swap;src:url("/assets/fonts/instrument-sans-latin-400-600.woff2") format("woff2")}
    :root{--bg:#F6F4EF;--surface:#FDFCF9;--surface-2:#EEEAE2;--ink:#182A2E;--ink-muted:#55666B;--line:#DDD6CA;--primary:#0E6B63;--primary-ink:#F6FBFA;--primary-soft:#E3EFED;--accent:#B25A38;--focus:#0E6B63}
    @page{size:A4;margin:0}
    *,*::before,*::after{box-sizing:border-box}
    html{background:var(--bg);color:var(--ink);font-family:"Instrument Sans",system-ui,sans-serif;font-size:10pt;line-height:1.5;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    body{margin:0;background:var(--bg)}
    .sheet{display:flex;min-height:297mm;flex-direction:column;background:var(--bg)}
    .brand-band{display:grid;grid-template-columns:1fr auto;align-items:center;gap:16mm;padding:13mm 16mm 11mm;background:var(--primary);color:var(--primary-ink)}
    .wordmark{font-family:"Fraunces",Georgia,serif;font-size:26pt;font-weight:600;letter-spacing:-.045em;line-height:1}
    .brand-band p{max-width:68mm;margin:0;color:var(--primary-ink);font-size:8.5pt;text-align:right}
    main{display:flex;flex:1;flex-direction:column;padding:13mm 16mm 8mm}
    .product-heading{display:flex;align-items:baseline;justify-content:space-between;gap:12mm;margin-bottom:8mm;padding-bottom:4mm;border-bottom:.25mm solid var(--line)}
    .eyebrow{margin:0;color:var(--accent);font-size:7.5pt;font-weight:600;letter-spacing:.11em;text-transform:uppercase}
    .model{margin:0;color:var(--ink-muted);font-size:8pt;font-weight:600}
    .product-hero{display:grid;grid-template-columns:minmax(0,.95fr) minmax(0,1.05fr);gap:11mm;align-items:center}
    .image-frame{display:grid;aspect-ratio:3/2;padding:8%;place-items:center;border:.25mm solid var(--line);border-radius:3mm;background:var(--surface-2)}
    .image-frame img{display:block;width:100%;height:100%;object-fit:contain}
    h1,h2{font-family:"Fraunces",Georgia,serif;font-weight:600;letter-spacing:-.03em;line-height:1.08}
    h1{margin:0 0 4mm;font-size:25pt}
    .tagline{margin:0 0 5mm;color:var(--primary);font-size:11.5pt;font-weight:600;line-height:1.35}
    .description{margin:0;color:var(--ink-muted);font-size:9.5pt;line-height:1.62}
    .conditions{margin-top:8mm;padding:6mm;border-left:1mm solid var(--primary);background:var(--primary-soft)}
    .conditions h2,.specifications h2{margin:0 0 3mm;font-size:13pt}
    .condition-list{display:flex;flex-wrap:wrap;gap:2mm;margin:0;padding:0;list-style:none}
    .condition-list li{padding:1.6mm 3mm;border-radius:999px;background:var(--surface);color:var(--ink);font-size:7.5pt;font-weight:600}
    .specifications{margin-top:9mm;break-inside:avoid}
    table{width:100%;border-collapse:collapse;font-size:8.5pt}
    th,td{padding:2.5mm 3mm;border-bottom:.25mm solid var(--line);text-align:left;vertical-align:top}
    tr:nth-child(odd){background:var(--surface-2)}
    th{width:36%;color:var(--ink-muted);font-weight:600}
    .catalogue-footer{display:grid;grid-template-columns:1fr auto;gap:12mm;align-items:end;margin-top:auto;padding-top:8mm;border-top:.25mm solid var(--line)}
    .contact strong,.contact span{display:block}
    .contact strong{margin-bottom:1mm;color:var(--primary);font-size:9pt}
    .contact span{color:var(--ink-muted);font-size:7.5pt}
    .disclaimer{max-width:91mm;margin:0;color:var(--ink-muted);font-size:6.7pt;line-height:1.45;text-align:right}
    .loading{display:grid;min-height:297mm;place-items:center;color:var(--ink-muted)}
    @media screen{body{padding:24px}.sheet{width:210mm;margin:auto;box-shadow:0 18px 60px rgba(24,42,46,.14)}}
  </style>
</head>
<body>
  <div class="loading" id="catalogue">Preparing catalogue...</div>
  <script>
    (() => {
      const escapeHtml = (value = '') => String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');

      const phoneDisplay = (number) => {
        const digits = String(number || '').replace(/\D/g, '');
        return digits.length === 10 ? `+91 ${digits}` : `+${digits}`;
      };

      const render = ({ product, company, theme }) => {
        Object.entries(theme.light).forEach(([token, value]) => {
          document.documentElement.style.setProperty(token, value);
        });
        document.title = `${product.name} Catalogue | Naviga Life`;
        const visibleSpecs = (product.specs || []).filter((spec) => spec.visible !== false);
        document.querySelector('#catalogue').outerHTML = `
          <article class="sheet">
            <header class="brand-band">
              <div class="wordmark">Naviga Life</div>
              <p>Guided compression therapy protocols for vascular, lymphatic, mobility, and recovery needs.</p>
            </header>
            <main>
              <div class="product-heading">
                <p class="eyebrow">${escapeHtml(product.category)}</p>
                <p class="model">${escapeHtml(product.model || 'Medical compression system')}</p>
              </div>
              <section class="product-hero" aria-labelledby="product-name">
                <div class="image-frame">
                  <img src="/${escapeHtml(product.images[0])}" width="1800" height="1200" alt="Studio view of the ${escapeHtml(product.name)} compression therapy medical device">
                </div>
                <div>
                  <h1 id="product-name">${escapeHtml(product.name)}</h1>
                  ${product.tagline ? `<p class="tagline">${escapeHtml(product.tagline)}</p>` : ''}
                  <p class="description">${escapeHtml(product.description)}</p>
                </div>
              </section>
              <section class="conditions" aria-labelledby="conditions-title">
                <h2 id="conditions-title">Conditions and care goals supported</h2>
                <ul class="condition-list">${(product.conditions || []).map((condition) => `<li>${escapeHtml(condition)}</li>`).join('')}</ul>
              </section>
              <section class="specifications" aria-labelledby="specifications-title">
                <h2 id="specifications-title">Device specifications</h2>
                <table><tbody>${visibleSpecs.map((spec) => `<tr><th scope="row">${escapeHtml(spec.key)}</th><td>${escapeHtml(spec.value)}</td></tr>`).join('')}</tbody></table>
              </section>
              <footer class="catalogue-footer">
                <div class="contact">
                  <strong>${escapeHtml(company.legalName)}</strong>
                  <span>${escapeHtml(company.address)}</span>
                  <span>${escapeHtml(phoneDisplay(company.phone))} | navigalife.github.io</span>
                </div>
                <p class="disclaimer">Individual results may vary. Please consult your physician for guidance specific to your condition.</p>
              </footer>
            </main>
          </article>`;
        document.documentElement.dataset.catalogueReady = 'true';
      };

      const id = new URLSearchParams(location.search).get('id');
      Promise.all([
        fetch('/data/products.json').then((response) => response.json()),
        fetch('/data/company.json').then((response) => response.json()),
        fetch('/data/site-config.json').then((response) => response.json()),
        fetch('/data/themes.json').then((response) => response.json()),
      ]).then(([products, company, config, themes]) => {
        const product = products.find((candidate) => candidate.id === id && candidate.visible && candidate.catalogue);
        const theme = themes.find((candidate) => candidate.id === config.theme);
        if (!product) throw new Error(`Catalogue product not found: ${id}`);
        if (!theme) throw new Error(`Active theme not found: ${config.theme}`);
        render({ product, company, theme });
      }).catch((error) => {
        document.querySelector('#catalogue').textContent = error.message;
        document.documentElement.dataset.catalogueError = error.message;
      });
    })();
  </script>
</body>
</html>
