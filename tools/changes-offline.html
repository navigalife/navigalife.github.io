<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>MediVasc — staging offline</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(1200px 600px at 50% -10%, #123240 0%, #0b1f2a 55%, #081820 100%);
      color: #eaf2f4;
      display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 24px;
    }
    .card { max-width: 460px; }
    .brand {
      font-family: Georgia, "Times New Roman", serif;
      font-weight: 600; font-size: 1.6rem; letter-spacing: .3px;
      color: #fff; margin-bottom: 22px;
    }
    h1 { font-size: 1.5rem; line-height: 1.35; font-weight: 600; margin: 0 0 12px; }
    p { color: #9fb4bb; font-size: 1rem; line-height: 1.6; margin: 0 0 26px; }
    a.btn {
      display: inline-block; text-decoration: none;
      background: #14b8a6; color: #05201d; font-weight: 600;
      padding: 12px 22px; border-radius: 999px; font-size: .98rem;
      transition: background .15s ease;
    }
    a.btn:hover { background: #0fd3bd; }
    .dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#ef6b57; margin-right:8px; vertical-align:middle; }
    .sub { margin-top: 20px; font-size: .82rem; color: #6f858c; }
  </style>
</head>
<body>
  <main class="card">
    <div class="brand">MediVasc</div>
    <h1><span class="dot"></span>Staging is currently offline</h1>
    <p>The preview area at <strong>/changes</strong> has been switched off. There's nothing to review here right now.</p>
    <a class="btn" href="https://medivasc.in/">Go to medivasc.in →</a>
    <div class="sub">This is a private staging URL, not the live site.</div>
  </main>
</body>
</html>
